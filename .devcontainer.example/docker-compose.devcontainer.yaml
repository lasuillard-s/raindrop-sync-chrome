services:
  workspace:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - google-chrome:/home/node/.config/google-chrome/Default
    environment:
      CONTAINER: 1
      DISPLAY: ${DISPLAY:-novnc:0.0}
    healthcheck:
      disable: true
    cap_add:
      - SYS_ADMIN
    shm_size: 2gb

  novnc:
    image: theasp/novnc@sha256:49a5f119fe356d32dbcf21c037f174275a69067e890fb067c995a245833a2fee
    profiles:
      - novnc
    environment:
      DISPLAY_WIDTH: '${NOVNC_DISPLAY_WIDTH:-1600}'
      DISPLAY_HEIGHT: '${NOVNC_DISPLAY_HEIGHT:-968}'
    ports:
      - ${NOVNC_HOST:-127.0.0.1}:${NOVNC_PORT:-8080}:8080

volumes:
  google-chrome: {}
