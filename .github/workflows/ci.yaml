name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Check code formatting
        run: yarn run fmt:check

      - name: Lint code
        run: yarn run lint

      - name: Run check
        run: yarn run check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn run test

      - name: Upload test results to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
          report_type: test_results
          files: junit.xml
          flags: unit

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          fail_ci_if_error: false
          files: coverage/clover.xml
          flags: unit

  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build the application
        run: yarn run build

      - name: Get Playwright version
        run: |
          PLAYWRIGHT_VERSION="$(yarn exec --silent -- playwright --version | awk '{print $2}')"
          echo "PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION}" | tee --append "$GITHUB_ENV"

      - name: Build end-to-end test environment
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          push: false
          load: true
          source: ./e2e
          set: |
            playwright.cache-from=type=gha,scope=playwright
            playwright.cache-to=type=gha,scope=playwright

      - name: Run end-to-end tests
        run: yarn run e2e-docker

      - name: Upload Playwright report to GitHub
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            e2e/run-*.log
          retention-days: 7

      - name: Upload Playwright report to S3
        id: upload-playwright-report-s3
        if: always()
        env:
          PLAYWRIGHT_REPORT_S3_PREFIX: playwright-report-${{ github.run_id }}
        run: |
          aws s3 cp --recursive \
            playwright-report/ \
            "s3://${{ vars.PLAYWRIGHT_REPORTS_BUCKET }}/${{ env.PLAYWRIGHT_REPORT_S3_PREFIX }}/"

          report_index_url="https://${{ vars.PLAYWRIGHT_REPORTS_CDN }}/${{ env.PLAYWRIGHT_REPORT_S3_PREFIX }}/index.html"
          cat <<EOF | tee ./playwright-report.md $GITHUB_STEP_SUMMARY
          📊 Playwright test report is now available at [here](${report_index_url})
          EOF

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        if: always() && steps.upload-playwright-report-s3.outcome == 'success' && github.event_name == 'pull_request'
        with:
          comment-tag: playwright-report
          file-path: ./playwright-report.md
