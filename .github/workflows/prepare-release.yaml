name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semver-style tag for release (e.g., v1.0.0)
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v ]]; then
            echo "Tag must start with 'v'"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: yarn

      # https://github.com/killercup/cargo-edit/issues/864
      - name: Set version
        run: |
          tag="${{ inputs.tag }}"
          tag_no_v="${tag#v}"
          yarn version --new-version "$tag_no_v" --no-git-tag-version

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          sign-commits: true
          title: Release ${{ inputs.tag }}
          body: |
            ## Release ${{ inputs.tag }}

            This pull request prepares the repository for the ${{ inputs.tag }} release.

            ### Changes
            - Bumps package version to `${{ inputs.tag }}` (without creating a git tag)
            - Ready for review and merge

            ### Next Steps
            1. Review and merge this PR
            2. Create and publish a GitHub release with tag `${{ inputs.tag }}`
            3. The release workflow will automatically build and publish the package to Chrome Web Store
            4. It will take some time (hours to days) for a new version to be available in the Chrome Web Store due to review and approval process
          branch: release/${{ inputs.tag }}
          delete-branch: true
