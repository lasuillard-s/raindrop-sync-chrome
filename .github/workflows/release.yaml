name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: chrome-web-store
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .node-version
          cache: yarn

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Build extension
        run: yarn run build

      - name: Create an archive
        run: zip -r raindrop-sync-for-chrome.zip dist

      - name: Preserve build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: raindrop-sync-for-chrome
          path: ./raindrop-sync-for-chrome.zip
          retention-days: 14

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: true
          files: |
            raindrop-sync-for-chrome.zip

      - name: Publish to Chrome Web Store
        uses: MobileFirstLLC/cws-publish@569e87bc9a54ad7712ba6dc154a110d88af63b85 # 2.1.1
        with:
          action: publish
          extension_id: ${{ vars.CWS_EXTENSION_ID }}
          client_id: ${{ secrets.CWS_CLIENT_ID }}
          client_secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CWS_REFRESH_TOKEN }}
          zip_file: ./raindrop-sync-for-chrome.zip
